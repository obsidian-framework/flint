{% extends "view/layout/front.html" %}
{% block content %}
<div class="w-full max-w-sm">

    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-1">
            Obsidian_<span class="text-red-500 animate-blink">|</span>
        </h1>
        <p class="text-xs text-zinc-600">Sign in to your account</p>
    </div>

    {% if flash.error is defined %}
    <div class="flex items-center gap-3 bg-zinc-950 border border-red-500/30 px-4 py-3 mb-6 text-xs text-red-400">
        <span class="text-red-500">✕</span>
        {{ flash.error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
        {{ csrf_field() | raw }}

        <div class="mb-5">
            <label class="block text-xs text-zinc-500 mb-2 uppercase tracking-widest">Username</label>
            <input
                    type="text"
                    name="username"
                    autocomplete="username"
                    class="input"
                    placeholder="your_username"
                    value="{{ old.username }}"
            >
        </div>

        <div class="mb-8">
            <label class="block text-xs text-zinc-500 mb-2 uppercase tracking-widest">Password</label>
            <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    class="input"
                    placeholder="••••••••"
            >
        </div>

        <button
                type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-black text-sm font-bold py-3 transition-colors tracking-wide"
        >
            SIGN IN →
        </button>
    </form>

    <p class="text-center text-xs text-zinc-700 mt-6">
        No account?
        <a href="/register" class="text-zinc-500 hover:text-red-500 transition-colors ml-1">Register</a>
    </p>

</div>
{% endblock %}
