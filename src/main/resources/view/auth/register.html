{% extends "view/layout/front.html" %}
{% block content %}
<div class="w-full max-w-sm">

    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-1">
            Obsidian_<span class="text-red-500 animate-blink">|</span>
        </h1>
        <p class="text-xs text-zinc-600">Create your account</p>
    </div>

    {% if errors is defined %}
    <div class="bg-zinc-950 border border-red-500/30 px-4 py-3 mb-6">
        {% for error in errors %}
        <p class="text-xs text-red-400 flex items-center gap-2 mb-1 last:mb-0">
            <span class="text-red-500">✕</span>{{ error }}
        </p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="/register">
        {{ csrf_field() | raw }}

        <div class="mb-5">
            <label class="block text-xs text-zinc-500 mb-2 uppercase tracking-widest">Username</label>
            <input
                    type="text"
                    name="username"
                    autocomplete="username"
                    class="input"
                    placeholder="your_username"
                    value="{{ old.username }}"
            >
        </div>

        <div class="mb-5">
            <label class="block text-xs text-zinc-500 mb-2 uppercase tracking-widest">Password</label>
            <input
                    type="password"
                    name="password"
                    autocomplete="new-password"
                    class="input"
                    placeholder="••••••••"
            >
        </div>

        <div class="mb-8">
            <label class="block text-xs text-zinc-500 mb-2 uppercase tracking-widest">Confirm Password</label>
            <input
                    type="password"
                    name="password_confirmation"
                    autocomplete="new-password"
                    class="input"
                    placeholder="••••••••"
            >
        </div>

        <button
                type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-black text-sm font-bold py-3 transition-colors tracking-wide"
        >
            CREATE ACCOUNT →
        </button>
    </form>

    <p class="text-center text-xs text-zinc-700 mt-6">
        Already have an account?
        <a href="/login" class="text-zinc-500 hover:text-red-500 transition-colors ml-1">Sign in</a>
    </p>

</div>
{% endblock %}
